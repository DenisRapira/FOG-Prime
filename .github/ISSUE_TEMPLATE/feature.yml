name: Feature request
description: Propose a focused improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    attributes:
      label: Problem
      description: What user problem should be solved?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    attributes:
      label: Security and networking impact
    validations:
      required: true
