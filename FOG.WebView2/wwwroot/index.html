<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FOG Prime</title>
  <style>
    :root {
      --pink: #f50db4;
      --black: #000000;
      --off-black: #222222;
      --white: #ffffff;
      --wire: #f2f2f2;
      --blush: #fef4ff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--white);
      color: var(--black);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button {
      font: inherit;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      width: 100%;
      height: 100vh;
      min-height: 680px;
      border: 1px solid var(--wire);
    }

    .header {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      min-height: 72px;
      border-bottom: 1px solid var(--wire);
    }

    .header-cell {
      display: flex;
      align-items: center;
      height: 100%;
      padding: 0 20px;
      border-right: 1px solid var(--wire);
      font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .header-cell:last-child {
      justify-content: flex-end;
      border-right: 0;
    }

    .wordmark {
      padding: 0 22px;
      color: var(--black);
      font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.15;
      text-align: center;
      text-transform: uppercase;
    }

    .wordmark span {
      display: block;
      color: var(--pink);
    }

    .live {
      display: inline-block;
      width: 8px;
      height: 8px;
      margin-right: 8px;
      background: var(--pink);
    }

    .main {
      display: grid;
      grid-template-rows: auto minmax(310px, 1fr) auto;
      min-height: 0;
    }

    .hero {
      padding: 38px 32px 28px;
      text-align: center;
      border-bottom: 1px solid var(--wire);
    }

    .kicker {
      margin: 0 0 10px;
      color: var(--pink);
      font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      color: var(--black);
      font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
      font-size: 32px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0;
    }

    .message {
      max-width: 390px;
      margin: 14px auto 0;
      color: var(--off-black);
      font-size: 16px;
      line-height: 1.5;
    }

    .flow {
      position: relative;
      display: grid;
      align-content: center;
      gap: 34px;
      padding: 34px 54px;
      background: var(--white);
      border-bottom: 1px solid var(--wire);
    }

    .flow::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 1px;
      height: 240px;
      background: var(--wire);
      transform: translate(-50%, -50%);
    }

    .stage {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr) 56px;
      align-items: center;
      min-height: 72px;
      border: 1px solid var(--wire);
      background: var(--white);
      transition: border-color 220ms ease-out, background-color 220ms ease-out, color 220ms ease-out;
    }

    .stage-index {
      display: grid;
      place-items: center;
      align-self: stretch;
      border-right: 1px solid var(--wire);
      font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
      font-size: 12px;
      font-weight: 700;
    }

    .stage-copy {
      min-width: 0;
      padding: 12px 16px;
    }

    .stage-title {
      font-size: 16px;
      font-weight: 600;
    }

    .stage-note {
      margin-top: 3px;
      color: #777777;
      font-size: 12px;
      line-height: 1.33;
    }

    .stage-state {
      display: grid;
      place-items: center;
      align-self: stretch;
      border-left: 1px solid var(--wire);
      font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
      font-size: 12px;
      font-weight: 700;
    }

    .stage.active {
      border-color: var(--pink);
      background: var(--blush);
    }

    .stage.active .stage-index,
    .stage.active .stage-state {
      border-color: var(--pink);
      color: var(--pink);
    }

    .stage.done {
      border-color: var(--black);
    }

    .stage.done .stage-index {
      border-color: var(--black);
      background: var(--black);
      color: var(--white);
    }

    .stage.done .stage-state {
      border-color: var(--pink);
      background: var(--pink);
      color: var(--white);
    }

    .stage.failed {
      border-color: var(--pink);
    }

    .stage.failed .stage-state {
      border-color: var(--pink);
      color: var(--pink);
    }

    .result {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      min-height: 88px;
      border-bottom: 1px solid var(--wire);
    }

    .result-copy {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 18px 24px;
    }

    .result-label {
      color: #777777;
      font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .result-value {
      margin-top: 4px;
      font-size: 16px;
      font-weight: 600;
    }

    .action {
      min-width: 150px;
      border: 0;
      border-left: 1px solid var(--wire);
      border-radius: 0;
      background: var(--black);
      color: var(--white);
      cursor: pointer;
      font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      transition: color 220ms ease-out, background-color 220ms ease-out, border-color 220ms ease-out;
    }

    .action:hover {
      background: var(--off-black);
    }

    .action[hidden] {
      display: none;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 48px;
      padding: 0 20px;
      color: #777777;
      font-family: ui-monospace, "Cascadia Mono", Consolas, monospace;
      font-size: 11px;
      text-transform: uppercase;
    }

    .progress-track {
      width: 112px;
      height: 4px;
      background: var(--wire);
    }

    .progress-bar {
      width: 0;
      height: 100%;
      background: var(--pink);
      transition: width 300ms ease-out;
    }

    @media (max-height: 820px) {
      .hero {
        padding-block: 26px 20px;
      }

      .flow {
        gap: 22px;
        padding-block: 24px;
      }

      .stage {
        min-height: 64px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-cell"><span class="live"></span>Prime</div>
      <div class="wordmark">FOG<span>Connection</span></div>
      <div id="clock" class="header-cell">--:--</div>
    </header>

    <main class="main">
      <section class="hero">
        <p id="kicker" class="kicker">Automatic setup</p>
        <h1 id="title">Подготовка</h1>
        <p id="message" class="message">Настраиваем соединение автоматически.</p>
      </section>

      <section class="flow" aria-label="Этапы настройки">
        <article id="stageSystem" class="stage active">
          <div class="stage-index">01</div>
          <div class="stage-copy">
            <div class="stage-title">Система</div>
            <div class="stage-note">Проверка готовности</div>
          </div>
          <div class="stage-state">RUN</div>
        </article>

        <article id="stageEngine" class="stage">
          <div class="stage-index">02</div>
          <div class="stage-copy">
            <div class="stage-title">Соединение</div>
            <div class="stage-note">Автоматическая настройка</div>
          </div>
          <div class="stage-state">WAIT</div>
        </article>

        <article id="stageAccess" class="stage">
          <div class="stage-index">03</div>
          <div class="stage-copy">
            <div class="stage-title">Доступ</div>
            <div class="stage-note">Финальная проверка</div>
          </div>
          <div class="stage-state">WAIT</div>
        </article>
      </section>

      <section class="result">
        <div class="result-copy">
          <div class="result-label">Status</div>
          <div id="resultValue" class="result-value">Выполняется проверка</div>
        </div>
        <button id="actionButton" class="action" type="button" hidden>Повторить</button>
      </section>
    </main>

    <footer class="footer">
      <span>FOG PRIME / AUTO</span>
      <div class="progress-track" aria-hidden="true"><div id="progressBar" class="progress-bar"></div></div>
    </footer>
  </div>

  <script>
    const stageIds = ["stageSystem", "stageEngine", "stageAccess"];
    const actionButton = document.getElementById("actionButton");
    let currentStatus = "checking";

    function post(command) {
      window.chrome.webview.postMessage({ command });
    }

    function setStage(index, state) {
      const stage = document.getElementById(stageIds[index]);
      const stateNode = stage.querySelector(".stage-state");
      stage.className = `stage ${state}`.trim();
      stateNode.textContent = state === "done" ? "OK" : state === "active" ? "RUN" : state === "failed" ? "CHECK" : "WAIT";
    }

    function renderPrime(payload) {
      currentStatus = payload.status;
      document.getElementById("title").textContent = payload.title;
      document.getElementById("message").textContent = payload.message;
      document.getElementById("progressBar").style.width = `${payload.progress}%`;

      if (payload.status === "checking") {
        setStage(0, "active");
        setStage(1, "");
        setStage(2, "");
        document.getElementById("resultValue").textContent = "Проверяем готовность";
      } else if (payload.status === "starting") {
        setStage(0, "done");
        setStage(1, "active");
        setStage(2, "");
        document.getElementById("resultValue").textContent = "Подбираем соединение";
      } else if (payload.status === "testingDiscord") {
        setStage(0, "done");
        setStage(1, "done");
        setStage(2, "active");
        document.getElementById("resultValue").textContent = "Проверяем доступ";
      } else if (payload.status === "ready") {
        setStage(0, "done");
        setStage(1, "done");
        setStage(2, "done");
        document.getElementById("kicker").textContent = "Connection verified";
        document.getElementById("resultValue").textContent = "Соединение готово";
        actionButton.textContent = "Закрыть";
        actionButton.hidden = false;
      } else {
        setStage(0, payload.diagnostics && payload.diagnostics.summary.fail > 0 ? "failed" : "done");
        setStage(1, "done");
        setStage(2, "failed");
        document.getElementById("kicker").textContent = "Connection check";
        document.getElementById("resultValue").textContent = "Требуется повторная проверка";
        actionButton.textContent = "Повторить";
        actionButton.hidden = false;
      }

      if (!["ready", "needsAttention"].includes(payload.status)) {
        actionButton.hidden = true;
      }
    }

    window.chrome.webview.addEventListener("message", (event) => {
      const { type, payload } = event.data;
      if (type === "prime") {
        renderPrime(payload);
      }
    });

    actionButton.addEventListener("click", () => {
      if (currentStatus === "ready") {
        post("close");
      } else {
        actionButton.hidden = true;
        post("runPrime");
      }
    });

    function updateClock() {
      document.getElementById("clock").textContent = new Date().toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit" });
    }

    updateClock();
    window.setInterval(updateClock, 30000);
    post("ready");
  </script>
</body>
</html>
